# ─── EXPLICITLY NOT PROPOSED (stays in loom) ──────────────────────────
not_proposed:
  - file: guides/co-setup/09-proposal-protocol.md
    reason: >
      Extracted from codify.md Steps 7-8 documenting the BUILD→loom→atelier
