    reason: |
      NEW skill capturing Docker dev-environment patterns surfaced during
      kailash-coc-rs M2/M4 user-flow walks. Two MUST-class patterns ship
      in the initial skill body:

      PATTERN A — Cross-Platform GPG Keyring Bootstrap (FR-25)
      ----------------------------------------------------------
      Direct mount of host ~/.gnupg into a Linux container CANNOT deliver
      git commit -S signing on macOS hosts (the dominant developer surface).
      Two structural failure modes:

        1. :ro mount → "gpg: can't connect to the gpg-agent: Read-only
           file system" (Linux gpg-agent needs writable dir for its socket)
        2. rw mount → "gpg: failed to start gpg-agent: General error"
           (host macOS socket files S.gpg-agent + .#lk<HOSTNAME>.local.NNNNN
            leak in and confuse the Linux agent's startup probe)

      The structural fix: side-mount host keyring READ-ONLY at /host-gnupg
      (NOT at /home/vscode/.gnupg); bin/dev setup populates a FRESH
      container-side ~/.gnupg via prune-then-copy + denylist tar (exclude
      S.gpg-agent* + .#lk*, include everything else — covers pubring.kbx,
      pubring.gpg legacy, openpgp-revocs.d, tofu.db, gpg.conf, trustdb.gpg,
      private-keys-v1.d, and any future GnuPG state). Modes 700 throughout.

      Why each design property matters:
      - Side-mount (not direct mount): crosses the macOS↔Linux gpg-agent
        ABI gap; host keyring stays immutable from container via :ro.
      - Prune-then-copy: a key revoked on the host disappears from the
        container too — additive cp leaves revoked keys usable.
      - Denylist (not allowlist): survives GnuPG version drift; legacy
        pubring.gpg + future tofu.db inherit automatically.
      - umask 077 BEFORE copy: no permissive-bits window between cp and
        chmod.
      - 700 on private-keys-v1.d explicitly: GnuPG checks group/other
        bits on the secret-key subdir specifically.

      PATTERN B — Bundler Shared-Env Trap (Ruby NFR-12)
      ----------------------------------------------------------
      BUNDLE_PATH=<anything> exported in any layer (image ENV, compose
      environment:, host shell, .env, .bundle/config) FORCES bundler's
      isolated nested-layout install path
      (<base-path>/ruby/<ver>/gems/...) which is NOT on the default
      Gem.path. Result: a gem installed via Gemfile.user is in the
      filesystem but ruby -e 'require "<gem>"' fails with LoadError
      in a plain shell — only `bundle exec` works. Peer-validated as
      a silent NFR violation: users see "bundle install OK" then
      "require fails" with no obvious correlation.

      The structural fix: in every overlay-install path that touches
      `bundle install`, use `env -u BUNDLE_PATH -u BUNDLE_APP_CONFIG`
      to defensively unset BOTH variables. BUNDLE_PATH is the primary
      trap; BUNDLE_APP_CONFIG is the secondary (it points at
      .bundle/config which can re-supply BUNDLE_PATH). With both unset,
      bundler installs system-wide into GEM_HOME (flat layout) and the
      same shell can `require "<gem>"` directly.

      Defense in depth: ship a CI smoke test that asserts
      `[ -z "${BUNDLE_PATH:-}" ]` inside the built image — catches any
      regression that re-introduces the trap (e.g., a future Dockerfile
      `ENV BUNDLE_PATH=...` or a base-image change that defaults it).
