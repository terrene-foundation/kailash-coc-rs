source_repo: kailash-coc-rs
origin: use-template # explicit class discriminator per sync-flow.md §83
codify_date: 2026-06-24
codify_session: "fix(artifact-flow): GH-issue triage never reaches Route A→/codify routing — 3 compounding artifact gaps"
template_version: "2.23.12" # .claude/VERSION::version (committed HEAD)
coc_version: "2.45.0" # .claude/VERSION::upstream.template_version (committed HEAD)

# This proposal originates at kailash-coc-rs (a USE template, the origination
# node) from a Route-A downstream filing: a downstream consumer pulled a shipped
# COC-tooling artifact via /sync-from-template, dependabot flagged a HIGH advisory
# in it, and the consumer routed it UP to this template as a GitHub issue (the
# Route-A fallback path per artifact-flow.md § Downstream-Consumer Routing).
# Provenance is hop-level only (origin: downstream, via: kailash-coc-rs) — no
# consumer identity is carried, per upstream-issue-hygiene.md MUST-2.
#
# The issue itself (a transitive-dependency security bump in shipped tooling) is
# a routine COC-tooling fix. What this proposal codifies is the META-FAILURE it
# exposed: when the agent triaged that incoming GH issue, the COC artifacts that
# govern issue-routing DID NOT TRIGGER, and the agent improvised wrong routing
# (first "edit loom directly", then mis-classified the repo's role) before the
# user corrected it. Root-caused to THREE compounding artifact gaps below.
#
# Disclosure-scrub status: this proposal body is scrubbed per
# rules/upstream-issue-hygiene.md MUST-2 — no consumer project names, no operator
# host identifiers, no internal paths beyond the template/SDK surface, no key
# fingerprints. The specific dependency/advisory IDs are deliberately omitted
# here; the dependency bump rides its own routine COC-tooling proposal, not this
# meta-routing proposal.

changes:
  - file: .claude/rules/issue-triage-routing.md
    action: create
    suggested_tier: coc
    reason: |
      ROOT-CAUSE GAP 1 (trigger unreachability) + GAP 3 (index invisibility).

      The rule that governs incoming-issue routing — artifact-flow.md
      § "Issue Routing By Change Type" + § "Downstream-Consumer Routing"
      (Route A) — is scope: path-scoped with
      paths: [".claude/**", "sync-manifest.yaml", "**/VERSION", "*.md"].
      The triage ENTRY POINT is reading a GitHub issue via `gh issue list` /
      `gh issue view` — which touches NONE of those globs. So the one rule
      that says "a COC-artifact issue filed on a USE template = Route A ->
      consolidate -> /codify Step 7b -> loom /sync-from-use" never enters
      context at the exact moment it is needed. A rule about how to handle an
      incoming issue is gated behind EDITING artifact files. Additionally,
      artifact-flow.md is absent from the kailash-coc-* template CLAUDE.md
      Rules Index entirely (neither baseline nor path-scoped lists referenced
      it), so even reasoning from the baseline surfaced no pointer.

      FIX (recommended placement — loom Gate-1 decides the exact mechanism):
      author a SHORT always-loaded baseline rule rules/issue-triage-routing.md
      (~30-40 lines, scope: baseline / always-loaded) that carries ONLY the
      routing POINTER and defers depth to artifact-flow.md. Always-loaded is
      required because path-scoping structurally cannot match a `gh` call; a
      brief baseline pointer + path-scoped depth is the standard rule-authoring
      split (rule-authoring.md) and avoids bloating every session with the full
      ~391-line artifact-flow.md. Distributed via /sync-to-use, it fixes the
      reachability gap across ALL templates AND downstream consumers (which
      also triage issues via Route A / Step 7c), unlike a per-template
      CLAUDE.md pointer (CLAUDE.md is template-owned, not redistributable).

      PROPOSED BODY (substance for loom to author the canonical rule from):
        # Issue Triage -> Upflow Routing (always-loaded)
        When triaging a GitHub issue on THIS repo, route by repo class FIRST
        (read .claude/VERSION::type):
          - coc-use-template -> a COC-artifact issue here is a Route-A
            downstream filing (or owner-filed on its behalf). This repo is the
            origination node: consolidate open COC-artifact issues -> /codify
            Step 7b -> proposal in .claude/.proposals/ -> loom /sync-from-use
            ingests (Gate-1 classify) -> /sync-to-use redistributes.
          - coc-project (downstream) -> route UP to the template you pulled
            from: /codify Step 7c PR to the template inbox (primary) OR Route-A
            issue on the template (fallback). Never file on your own repo
            (orphan proposal); never file on loom (bypasses USE-template review).
          - coc-build -> SDK code: cross-SDK-FIRST -> /codify Step 7a.
          - coc-source (loom) -> loom Splits, Never Originates: ingest via
            /sync-from-build + /sync-from-use; do NOT originate.
        NEVER hand-edit loom directly; NEVER fix only by editing a synced
        artifact locally (Class-A non-durable — rebuilt by /sync-to-use). The
        durable surface is the proposal. Depth + the four repo classes + Route
        A/B + lifecycle: rules/artifact-flow.md § "Issue Routing By Change Type".

      Trust Posture Wiring: as a NEW rule, loom MUST author the canonical
      8-field "## Trust Posture Wiring" section per trust-posture.md MUST-8
      (codify.md Step 6b enforces this at loom-side authoring; cc-architect
      mechanical-sweep on the literal "## Trust Posture Wiring" header).
      Severity: advisory at hook layer (lexical routing detection cannot carry
      block per hook-output-discipline.md MUST-2); halt-and-report at
      gate-review.

  - file: .claude/commands/codify.md
    action: modify
    suggested_tier: coc
    reason: |
      ROOT-CAUSE GAP 2 (codify never consumes GH issues).

      codify.md Step 1 ("Consume learning digest") enumerates its input surface
      as learning-digest.json + learning-codified.json + journal + .session-notes.
      It NEVER instructs the agent to consolidate open GitHub issues that are
      Route-A downstream COC-artifact filings. The "template consolidates the
      filings, then /codify originates the proposal" step — the exact procedure
      a USE template is supposed to run — lives ONLY as prose in artifact-flow.md
      § Downstream-Consumer Routing; it is NOT wired as an executable input step
      in the command. Consequence: even when the agent reaches /codify, the
      command does not surface the incoming Route-A issues as proposal inputs.

      FIX: add to Step 1 (or a new Step 1b) a USE-template-gated input action:
        "If .claude/VERSION::type == coc-use-template: enumerate open GitHub
         issues on this repo classified as COC-artifact (Route-A) filings
         (`gh issue list --state open`); each is an input to Step-7b proposal
         origination. Consolidate duplicate/related filings; disclosure-scrub
         each per upstream-issue-hygiene.md MUST-2 (no consumer-identifying
         tokens carried into the proposal — hop-level provenance only)."
      This wires the consolidation step the user described ("you consolidate
      from all filings -> codify -> proposals") into the command itself, so it
      no longer depends on the path-scoped artifact-flow.md being in context.

  - file: CLAUDE.md
    action: modify
    suggested_tier: coc
    reason: |
      GAP 3 local fix (already applied at this template; recommend loom
      coordinate the same across sibling templates).

      Applied at this template on the current codify branch: added an
      always-loaded "## GitHub Issue Triage -> Upflow Routing" section + indexed
      artifact-flow.md in the Rules Index. CLAUDE.md is template-owned
      (preserved across syncs), so this edit is durable HERE but does NOT
      redistribute to sibling templates via /sync-to-use.

      RECOMMENDATION for loom: once change #1 (the synced baseline rule
      rules/issue-triage-routing.md) lands and distributes, the per-template
      CLAUDE.md pointer becomes belt-and-suspenders (nice-to-have, not required).
      If loom prefers the CLAUDE.md-pattern route INSTEAD of a baseline rule,
      then loom must coordinate adding the same always-loaded section to EACH
      kailash-coc-* template's template-owned CLAUDE.md (a per-template manual
      addition, since CLAUDE.md is not regenerated by sync). The baseline-rule
      route (change #1) is recommended over the per-template-CLAUDE.md route
      because it is single-source, synced, and reaches downstream consumers too.

    review_recommendations:
      - "Suggested classification: COC tier — issue-routing reachability applies to every USE template AND every downstream consumer."
      - "Gate-1: prefer change #1 (synced baseline rule) as the primary fix; treat change #3 (CLAUDE.md) as the already-applied local stopgap at the origin template. Decide whether to also propagate the CLAUDE.md pointer to sibling templates or rely solely on the baseline rule."
      - "The new baseline rule (change #1) MUST receive a full Trust Posture Wiring section authored at loom per trust-posture.md MUST-8 (codify.md Step 6b). cc-architect mechanical-sweep: grep for the literal header '## Trust Posture Wiring' + the 8 canonical fields."
      - "Self-referential gate: change #2 touches commands/codify.md and change #1 is a new routing rule — both are codify-governing surfaces per self-referential-codify.md Rule 2; loom-side authoring MUST run the mandatory multi-agent redteam-with-tests round (reviewer + security-reviewer + structural-validator) regardless of posture."
      - "Keep the routing-pointer baseline rule SHORT (~30-40 lines, pointer-only) — depth stays in artifact-flow.md per rule-authoring.md brief-baseline + path-scoped-depth split; an always-loaded ~391-line rule would bloat every session's context."
      - "Baseline-headroom caution: codex-rs / gemini-rs baselines were ~10.8-11.3% headroom in recent sync receipts (within the 15% proximity band). A NEW always-loaded baseline rule adds to every CLI baseline — loom MUST re-check emit.mjs strict-headroom before landing change #1 as baseline; if it breaches, the fallback is the per-template CLAUDE.md route (change #3) which does not touch the codex/gemini baseline."

status: pending_review
