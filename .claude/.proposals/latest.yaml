  - file: .claude/skills/18-security-patterns/docker-disclosure-scrub.md
    action: created
    suggested_tier: coc
    reason: |
      NEW skill capturing the 7-check disclosure-scrub pattern from
      kailash-coc-rs M3 R1 closure. Applies to every public-surface
      Docker template that ships in a public repository under the
      Terrene Foundation's public-template fleet.

      The 7 mechanical greps (all positive-allowlist-tightened so future
      novel disclosure types are FLAGGED, not silently passed):

        (a) operator-home leaks (/Users/<name>/, /home/<name>/) — comment
            lines and /home/vscode/ exempted (in-container path)
        (b) literal API-key shapes (sk-*, ghp_*, AIza*, eyJ* JWT, AKIA*) —
            placeholder strings exempted (your-key-here, EXAMPLE)
        (c) --build-arg with secret-shaped values (KEY=, TOKEN=, SECRET=,
            PASSWORD=, API=)
        (d) COPY/ADD of secret or host-config dirs (.env, .claude/, .codex/,
            .gemini/, .ssh/, .gnupg/, secrets/) in Dockerfile + Dockerfile.user
        (e) .dockerignore coverage assertion against mandatory list (.env,
            **/.env, secrets/, *.pem, *.key, .claude/learning/, workspaces/,
            compose.override.yml, *.local, Gemfile.user.lock)
        (f) machine hostnames + operator identifiers (per session-notes:42
            disclosure class — Jacks-Mac-Studio etc.; operator-id, verified_id,
            person_id from coordination-log records)
        (g) GitHub org slugs beyond the public allowlist (terrene-foundation,
            esperie, nodesource, microsoft, anthropic-ai, openai, google,
            modelcontextprotocol, devcontainers)

      Each check ships with FAIL output that names the file:line so the
      operator can fix at the source. The full M2_FILES file-set is:
        Dockerfile bin/dev docker-compose.yml .devcontainer/devcontainer.json
        .dockerignore .gitignore .env.example requirements-user.txt
        Gemfile.user Dockerfile.user compose.override.yml.example

      Runs both in CI (as the first workflow step BEFORE any image build)
      AND locally during developer pre-push. Mechanical, deterministic,
      O(files * lines). The 7-check pattern is the structural defense
      for the brief-anchored "public-surface constraint" — every Docker
      artifact ships in a public template repository.
