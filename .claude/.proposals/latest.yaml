codify_session: "feat(co): specs authority system — phase command integration"
loom_version: "2.8.0" # from .claude/VERSION
coc_version: "2.8.0"

# Upstream target: atelier/ (CC+CO authority)
#
# Context: On 2026-04-12 loom shipped commit eacd989 "feat(co): add specs
# authority system for alignment drift prevention" — new rule + phase command
# integration. Atelier already received `rules/specs-authority.md` and the
# `rules/artifact-flow.md` proposal-lifecycle additions (both show mtime
# 2026-04-12 17:10 on atelier side). However the PHASE COMMAND updates that
# operationalize the rule never made it into a proposal and remain loom-only.
#
# This proposal covers ONLY the still-outstanding atelier-bound work: phase
# command integration + the rules/agents.md "Specs Context in Delegation"
# clause. The already-placed rules are listed under `already_placed:` for
# audit trail completeness but require no atelier action.

changes:
  # ─── PHASE COMMAND INTEGRATION (atelier phase names differ from loom) ──
  #
  # Atelier phase names: analyze → plan → execute → vet → codify → wrapup
  # Loom (COC) phase names: analyze → todos → implement → redteam → codify → wrapup
  #
  # The specs/ integration is the SAME in both; only command file names and
  # inline phase references need adaptation.

  - file: commands/analyze.md
    action: modified
    suggested_tier: cc
    canonical_path: .claude/commands/analyze.md
    reason: >
      Add Step 5 "Create specs/ (MUST — before red team)": create `specs/`
      at project root with `_index.md` manifest organized by domain ontology.
      This is the load-bearing gate that converts the specs-authority rule
      from theoretical to operational — /plan and /execute hard-stop if
      specs/ is missing (MUST Rule 1). Without this, the rule exists but
      nothing ever creates the directory.
    diff_lines: "+20 -1"
    adaptation_notes: >
      Loom's analyze.md Step 5 is drop-in compatible with atelier's
      analyze.md. The phrase "before red team" should become "before vet"
      in atelier's version to match /vet naming. Step references "workspaces
      /<project>/" structure which atelier shares.

  - file: commands/todos.md → atelier commands/plan.md
    action: modified
    suggested_tier: cc
    canonical_path: .claude/commands/plan.md
    reason: >
      Add specs read-gate and todo→spec linkage: (a) Read `specs/_index.md`
      and all relevant spec files before building plan. (b) HARD STOP if
      `specs/_index.md` missing — return to /analyze Step 5, do NOT create
      specs during /plan. (c) Each todo MUST reference which spec file(s)
      it implements (e.g., "Implements: specs/authentication.md §Login
      Flow"). This is MUST Rule 4 ("Phase Commands Read Specs Before Acting")
      operationalized as a plan-level contract.
    diff_lines: "+4"
    adaptation_notes: >
      Replace "todo" terminology with "task" if atelier uses that. Replace
      "/analyze Step 5" reference with atelier's equivalent. The hard-stop
      language ("STOP — return to /analyze") is deliberate tripwire
      wording from rules/rule-authoring.md and should be preserved verbatim.

  - file: commands/implement.md → atelier commands/execute.md
    action: modified
    suggested_tier: cc
    canonical_path: .claude/commands/execute.md
    reason: >
      Five specs-related additions to the /execute loop:
      (1) Brief-change detection — if any file in briefs/ was modified after
      specs/_index.md, STOP and flag for user (re-run /analyze or acknowledge).
      (2) Context anchoring — re-read relevant spec files at start of every
      todo; spec is the authority on what to build.
      (3) Code-as-truth caveat — read current source before calling any
      existing function; code is truth for what EXISTS NOW, specs are truth
      for what SHOULD exist.
      (4) Deviation check — if execution deviates from spec, STOP: update
      spec with deviation + rationale, flag user-visible changes for approval
      before marking complete.
      (5) Orchestrator-only spec writes — specialist agents report domain
      truth changes in output; only orchestrator applies them sequentially.
      This prevents concurrent spec writes from parallel subagents.
    diff_lines: "+47 -12"
    adaptation_notes: >
      The five additions map directly into any execution phase. Keep the
      orchestrator-only spec-write rule verbatim — it's the race condition
      fix from /redteam Round 2 (scenario: parallel specialists rewriting
      specs/data-model.md).

  - file: commands/redteam.md → atelier commands/vet.md
    action: modified
    suggested_tier: cc
    canonical_path: .claude/commands/vet.md
    reason: >
      Three specs-related additions to /vet:
      (a) Specs as PRIMARY source in audit surface — specs/** reads take
      priority over plans/ and journals/.
      (b) Specs-to-code verification — for every file in specs/, extract
      assertions at FIELD level (not just endpoint/class level) and verify
      against code via grep/AST. Divergence without logged deviation = HIGH.
      (c) Cross-spec consistency — grep all specs for shared terms (TTLs,
      limits, field names, endpoint paths); contradictory values = HIGH.
      (d) Brief-to-spec coverage — for each brief requirement, verify it
      maps to ≥1 spec section; unmapped = HIGH.
    diff_lines: "+28 -6"
    adaptation_notes: >
      The field-level assertion extraction is critical — endpoint-level audits
      miss parameter drift (the exact failure the spec authority system was
      designed to prevent). Keep the "= HIGH" severity markers.

  - file: commands/codify.md
    action: modified
    suggested_tier: cc
    canonical_path: .claude/commands/codify.md
    reason: >
      Add specs/ to the knowledge-extraction source list in Step 1. Specs/
      contain the nuanced decisions, contracts, and constraints that should
      inform agent and skill updates during codification. Without this,
      /codify still works from plans and journals but misses the detailed
      domain truth that specs capture.
    diff_lines: "+8 -2"
    adaptation_notes: >
      One-line addition to the knowledge source list. Atelier's codify.md
      already reads docs/00-authority/; add specs/ as a peer source.

  - file: commands/wrapup.md
    action: modified
    suggested_tier: cc
    canonical_path: .claude/commands/wrapup.md
    reason: >
      Add specs/ to the "already has for free" persistence list so session
      notes don't redundantly recapture domain truth that specs already hold.
    diff_lines: "+1"
    adaptation_notes: >
      Trivial addition: one bullet under existing persistence list.

  # ─── RULES AGENTS.MD — SPECS CONTEXT IN DELEGATION ────────────────────

  - file: rules/agents.md → atelier rules/execution-discipline.md
    action: modified
    suggested_tier: co
    canonical_path: .claude/rules/execution-discipline.md
    reason: >
      Add "Specs Context in Delegation (MUST)" clause: every specialist
      delegation prompt MUST include relevant spec file content from specs/.
      Orchestrator reads specs/_index.md, selects relevant files, includes
      them inline. This operationalizes specs-authority.md MUST Rule 7 at
      the rule layer so the delegation contract is enforced outside /execute.
      Without this, /execute includes specs but one-off Agent() calls from
      other commands (/vet, /codify, ad-hoc) skip the context entirely.
    diff_lines: "+12"
    adaptation_notes: >
      Clause wording is universal. Place adjacent to any existing delegation
      or parallel-execution clauses. Cross-reference specs-authority.md
      MUST Rule 7 for the full protocol and examples.

# ─── ALREADY PLACED IN ATELIER (audit trail only, no action needed) ────
