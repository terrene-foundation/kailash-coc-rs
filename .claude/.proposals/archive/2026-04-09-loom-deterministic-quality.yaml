source_repo: loom
codify_date: 2026-04-09
codify_session: "feat(guides,rules): deterministic quality guide + rule-authoring meta-rule"
loom_version: "2.8.0" # from .claude/VERSION
coc_version: "2.8.0"

# Upstream target: atelier/ (CC+CO authority)
# These artifacts originated in loom but are domain-agnostic CC/CO methodology.
# They should live in atelier so ALL downstream repos (not just codegen) inherit them.

changes:
  # ─── NEW RULES ───────────────────────────────────────────────────

  - file: rules/rule-authoring.md
    action: created
    suggested_tier: cc
    canonical_path: .claude/rules/rule-authoring.md
    reason: >
      Meta-rule for authoring CC/CO rules. Defines 6 MUST clauses including the
      Loud/Linguistic/Layered test — validated by subprocess A/B test (rule quality
      2/6 → 6/6 when loaded). Completely domain-agnostic: applies to ANY rule in
      ANY repo, not just codegen. Atelier has no equivalent — rules/cc-artifacts.md
      covers artifact quality but not rule-authoring methodology.
    diff_lines: "+94"
    adaptation_notes: >
      Ready to place as-is. No loom/COC-specific references. The only cross-reference
      is to guides/deterministic-quality/01-rule-authoring-principles.md (also in
      this proposal) and rules/cc-artifacts.md Clause #10 (also in this proposal).

  - file: rules/git.md
    action: created
    suggested_tier: co
    canonical_path: .claude/rules/git.md
    reason: >
      Git workflow discipline: conventional commits, branch naming, branch protection,
      PR descriptions, atomic commits, and — new in 2.8.0 — "commit bodies MUST
      answer WHY not WHAT" with DO/DON'T example. General software engineering
      discipline, not codegen-specific. Atelier has NO git.md rule at all.
    diff_lines: "+95"
    adaptation_notes: >
      The branch protection table lists specific repos (kailash-py, kailash-rs,
      kailash-coc-claude-py/rs). Atelier version should either generalize the table
      or replace with atelier's own protected repos. The rest is universal.

  # ─── NEW GUIDE (Part I only — CC/CO methodology) ────────────────

  - file: guides/deterministic-quality/01-rule-authoring-principles.md
    action: created
    suggested_tier: cc
    canonical_path: .claude/guides/deterministic-quality/01-rule-authoring-principles.md
    reason: >
      Principles behind the rule-authoring meta-rule: why rules fail (too quiet,
      too abstract, wrong layer), the Loud/Linguistic/Layered framework, clause
      anatomy (MUST + DO/DON'T + Why + BLOCKED). Evidence-based — derived from
      0052-DISCOVERY session productivity analysis. Domain-agnostic.
    diff_lines: "+188"
    adaptation_notes: >
      Uses Kailash SDK examples in DO/DON'T blocks. Atelier version should swap
      examples for domain-agnostic ones (or keep them as illustrative — they
      demonstrate the principle regardless of SDK).

  - file: guides/deterministic-quality/02-session-architecture.md
    action: created
    suggested_tier: cc
    canonical_path: .claude/guides/deterministic-quality/02-session-architecture.md
    reason: >
      Documents the 4-layer CC session loading model (always-on baseline, path-scoped
      injection, on-demand skill activation, reactive hook enforcement). Explains
      WHY rules/skills/hooks behave differently and how to choose the right layer.
      Atelier's guides/claude-code/08-the-rule-system.md partially covers this but
      lacks the 4-layer framing and the load-timing analysis.
    diff_lines: "+233"
    adaptation_notes: >
      References loom's specific hook files (session-start.js, log-triage-gate.js)
      as examples. Atelier version should use atelier's own hooks or generalize.

  - file: guides/deterministic-quality/03-enforcement-ladder.md
    action: created
    suggested_tier: cc
    canonical_path: .claude/guides/deterministic-quality/03-enforcement-ladder.md
    reason: >
      Rung 0-6 enforcement mechanisms: CLAUDE.md prose → rules → path-scoped rules
      → skills → hooks → CI/CD. Maps each mechanism to its strength/weakness and
      when to escalate. Domain-agnostic CC orchestration knowledge.
    diff_lines: "+152"
    adaptation_notes: >
      Uses Kailash testing rules and DataFlow hooks as examples. Atelier version
      should swap for domain-agnostic examples while preserving the ladder structure.

  - file: guides/deterministic-quality/README.md
    action: created
    suggested_tier: cc
    canonical_path: .claude/guides/deterministic-quality/README.md
    reason: >
      Index file for the guide. At atelier, only Part I (files 01-03) applies.
      Part II (files 04-08: type system, runtime safety, observability, destructive
      gates, cross-SDK parity) is Kailash SDK-specific and stays in loom.
    diff_lines: "+91"
    adaptation_notes: >
      README must be rewritten for atelier to index only Part I (3 files) and
      explain that Part II lives in loom as codegen-specific material.

  # ─── MODIFICATIONS TO EXISTING ATELIER ARTIFACTS ────────────────

  - file: rules/cc-artifacts.md
    action: modified
    suggested_tier: cc
    canonical_path: .claude/rules/cc-artifacts.md
    reason: >
      Add Clause #10: new rules MUST follow rules/rule-authoring.md meta-rule
      (Loud/Linguistic/Layered test). Without this clause, the meta-rule exists
      but nothing forces authors to consult it. Atelier's cc-artifacts.md has
      6 MUST NOT clauses; this adds a 7th MUST clause.
    diff_lines: "+6"
    adaptation_notes: >
      Atelier's cc-artifacts.md has different numbering (18 clauses vs loom's).
      The clause content is identical but must be inserted at the right position
      in atelier's numbering scheme.

  - file: rules/agents.md (§ Quality Gates)
    action: modified
    suggested_tier: co
    canonical_path: .claude/rules/execution-discipline.md # atelier equivalent
    reason: >
      Gate reviews at /implement and /release upgraded RECOMMENDED → MUST with
      background-agent pattern (spawn reviewer + security-reviewer in parallel as
      background agents, near-zero parent context cost). Evidence: 0052-DISCOVERY
      §3.3 — six commits shipped without review when gates said "recommended."
      Atelier has execution-discipline.md but no gate-review MUST enforcement.
    diff_lines: "+35 -1"
    adaptation_notes: >
      The specific gates (analyze, todos, implement, redteam, codify, release) are
      COC phases. Atelier's equivalent phases are (analyze, plan, execute, vet,
      codify, deliver). The PRINCIPLE (MUST gates with background agents) is
      universal; the GATE TABLE needs adaptation to atelier's phase names.

  # ─── REFERENCE (provenance, not an artifact) ────────────────────

  - file: journal/0052-DISCOVERY-session-productivity-patterns.md
    action: reference
    suggested_tier: co
    canonical_path: null # not placed; cited as provenance
    reason: >
      Originating discovery behind all artifacts in this proposal. Documents the
      six-commit no-review drift, gate-phrasing failure mode, subprocess A/B
      evidence for rule-authoring meta-rule. Atelier may want to create its own
      journal entry referencing this discovery, or copy it to atelier's journal.
    diff_lines: "~200"
    adaptation_notes: >
      Contains loom-specific commit hashes and file paths. If copied to atelier
      journal, needs light adaptation (replace loom paths with atelier equivalents
      where applicable, keep loom references as cross-repo citations).

  # ─── EXPLICITLY NOT PROPOSED (stays in loom) ────────────────────
  # guides/deterministic-quality/04-type-system-enforcement.md     — Kailash SDK types
  # guides/deterministic-quality/05-runtime-safety-defaults.md     — SDK runtime primitives
  # guides/deterministic-quality/06-observability-primitives.md    — SDK observability
  # guides/deterministic-quality/07-destructive-operation-gates.md — SDK destructive ops
  # guides/deterministic-quality/08-cross-sdk-parity.md            — py/rs/rb parity
  # rules/dataflow-identifier-safety.md                            — DataFlow-specific
  # rules/facade-manager-detection.md                              — DataFlow-specific
  # rules/orphan-detection.md                                      — DataFlow-specific
  # rules/tenant-isolation.md                                      — DataFlow-specific
  # rules/dataflow-pool.md                                         — DataFlow-specific
  # rules/zero-tolerance.md (Phase 5 examples)                     — DataFlow incidents
  # rules/observability.md (bulk WARN)                             — SDK primitives

