name: COC Sync PR Notification (no auto-merge)

# kailash-coc-rs is a multi-CLI USE template (claude, codex, gemini) for
# Python/Ruby developers consuming the Rust-backed kailash-rs binding.
# All PRs require admin approval — including COC sync PRs.

on:
  pull_request:
    types: [labeled, opened]

jobs:
  notify:
    if: |
      github.event.label.name == 'coc-sync' ||
      (github.event.action == 'opened' && contains(github.event.pull_request.labels.*.name, 'coc-sync'))
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPO: ${{ github.repository }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            payload=$(jq -n \
              --arg t "[COC-SYNC PR #${PR_NUMBER}] ${PR_TITLE}" \
              --arg url "https://github.com/${REPO}/pull/${PR_NUMBER}" \
              '{embeds:[{title:$t,url:$url,color:3447003,description:"COC sync from BUILD repo — awaiting admin review."}]}')
            curl -s -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK_URL" || true
          fi
