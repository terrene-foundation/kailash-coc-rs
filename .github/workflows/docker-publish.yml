# =============================================================================
# Docker Publish — multi-arch, multi-registry image publish (M5 / F9)
# -----------------------------------------------------------------------------
# Dual-distribution (journal/0018, brief § Distribution CORRECTED): users may
# EITHER build-on-first-use locally (./bin/dev) OR `docker pull` this prebuilt
# image. This workflow publishes the latter.
#
# Trigger: version tags (release-gated) + a workflow_dispatch dry-run proxy
#   (per ci-runners §8 — a tag-gated job MUST have a non-tag exercise path).
#
# Registries are OPT-IN, by presence of their config (push to as many as you
# configure — Docker Hub, GHCR, a private/Azure registry; "not just 1"):
#   - Docker Hub : repo VARIABLE `DOCKERHUB_NAMESPACE` + secrets
#                  `DOCKERHUB_USERNAME` / `DOCKERHUB_TOKEN`
#   - GHCR       : always on (built-in `GITHUB_TOKEN`; `packages: write`)
#   - Private    : repo VARIABLE `PRIVATE_REGISTRY` (host[/ns]) + secrets
#                  `PRIVATE_REGISTRY_USERNAME` / `PRIVATE_REGISTRY_PASSWORD`
# Namespaces come from repo VARIABLES, never hardcoded — no operator identifier
# enters this committed file (public-surface, FR-21/NFR-11).
#
# COST FOOTPRINT (ci-runners §7/§10): tag-triggered (rare) + manual dispatch.
#   ~15-25 min/run (amd64 native + arm64 via QEMU). No cron, no per-PR fire.
#
# F4 caveat: the image bakes the current Ruby binding, whose `require "kailash"`
# is blocked upstream (kailash-rs#1151). Python binding works. Surfaced via the
# `io.kailash.ruby-binding` OCI label + README so pullers see it.
# =============================================================================
name: Docker Publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build multi-arch + run the layer-secret gate but DO NOT push"
        type: boolean
        default: true

concurrency:
  group: docker-publish-${{ github.ref }}
  # cancel-in-progress: false because the build-push step pushes a multi-arch
  # manifest to N registries non-atomically; a cancelled mid-push leaves a
  # partially-published manifest set that the next run cannot reliably detect.
  # (deploy-hygiene.md Rule 11 exception — non-idempotent step named.)
  cancel-in-progress: false

permissions:
  contents: read
  packages: write # GHCR push via GITHUB_TOKEN

jobs:
  publish:
    name: Build + publish multi-arch image
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # --- Resolve which registries are configured → image-ref list ----------
      - name: Resolve target image refs (opt-in per configured registry)
        id: refs
        env:
          DH_NS: ${{ vars.DOCKERHUB_NAMESPACE }}
          PRIV: ${{ vars.PRIVATE_REGISTRY }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          # GHCR requires a lowercase owner; Docker Hub/private namespaces come
          # from operator-set repo variables (never hardcoded here).
          owner_lc="$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')"
          refs="ghcr.io/${owner_lc}/kailash-coc-rs"            # GHCR: always on
          [ -n "${DH_NS}" ] && refs="${refs}"$'\n'"docker.io/${DH_NS}/kailash-coc-rs"
          [ -n "${PRIV}" ]  && refs="${refs}"$'\n'"${PRIV}/kailash-coc-rs"
          echo "Configured image refs:"; echo "$refs"
          { echo "images<<EOF"; echo "$refs"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (arm64 emulation for the multi-arch manifest)
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Registry logins (each opt-in; skipped when unconfigured) ----------
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ vars.DOCKERHUB_NAMESPACE != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to private registry
        if: ${{ vars.PRIVATE_REGISTRY != '' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.PRIVATE_REGISTRY }}
          username: ${{ secrets.PRIVATE_REGISTRY_USERNAME }}
          password: ${{ secrets.PRIVATE_REGISTRY_PASSWORD }}

      # --- Tag derivation (semver from the tag + latest) ---------------------
      - name: Derive tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.refs.outputs.images }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
          labels: |
            org.opencontainers.image.title=kailash-coc-rs dev environment
            io.kailash.ruby-binding=blocked-upstream-kailash-rs-1151

      # --- Defense-in-depth: build amd64 locally, prove zero secrets in layers
      #     BEFORE any push (gate). Structural guarantee already holds (no COPY
      #     of source, no ENV/build-arg secrets) — this is the publish-time net.
      - name: Build amd64 (load) + layer-secret gate
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          load: true
          tags: kailash-coc-rs:layer-gate
          cache-from: type=gha,scope=docker-publish
          cache-to: type=gha,mode=max,scope=docker-publish
      - name: Layer-secret gate (no secrets in any layer)
        run: |
          set -euo pipefail
          # Capture FIRST so an absent/unloaded image (empty output) or a
          # `docker history` error FAILS the gate — "scanned-clean" must be
          # distinct from "did-not-scan" (sec-review HIGH-1).
          out="$(docker history --no-trunc --format '{{.CreatedBy}}' kailash-coc-rs:layer-gate)"
          [ -n "$out" ] || { echo "✗ docker history empty — image not built/loaded; refusing to publish"; exit 1; }
          if printf '%s\n' "$out" | grep -iqE '(API_KEY=|TOKEN=|SECRET=|PASSWORD=|sk-[A-Za-z0-9]{15,}|ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9]{20,}|xox[baprs]-|glpat-|AIza[0-9A-Za-z_-]{30,}|ya29\.|BEGIN[ A-Z]*PRIVATE KEY)'; then
            echo "✗ secret found in an image layer — refusing to publish"; exit 1
          fi
          echo "✓ no secrets in any layer ($(printf '%s\n' "$out" | wc -l) layers scanned)"

      # --- Build multi-arch + push to ALL configured registries (one build) --
      - name: Build + push (amd64 + arm64) → all configured registries
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ env.DRY_RUN != 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=docker-publish
          cache-to: type=gha,mode=max,scope=docker-publish

      # Keep the Docker Hub repo "overview" in sync with the in-repo source of
      # truth on every publish (Docker Hub only; GHCR/private overviews are set
      # elsewhere). Source: .github/DOCKERHUB-OVERVIEW.md.
      - name: Sync Docker Hub overview (README → Hub repo description)
        if: ${{ vars.DOCKERHUB_NAMESPACE != '' && env.DRY_RUN != 'true' }}
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ vars.DOCKERHUB_NAMESPACE }}/kailash-coc-rs
          readme-filepath: ./.github/DOCKERHUB-OVERVIEW.md
          short-description: "Multi-CLI (Claude Code/Codex/Gemini) dev env for the Kailash Rust SDK via Python+Ruby bindings."

      - name: Summary
        env:
          IMAGES: ${{ steps.refs.outputs.images }}
        run: |
          if [ "${DRY_RUN}" = "true" ]; then
            echo "DRY RUN — built multi-arch + passed layer-secret gate; pushed nothing."
          else
            echo "Published to:"; printf '%s\n' "$IMAGES"
          fi
